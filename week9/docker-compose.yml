services:
  # ---------------------------------------------------------------------------
  # Persona A — nginx (frontend / reverse proxy)
  # ---------------------------------------------------------------------------
  nginx:
    build: ./nginx
    image: greendevcorp/nginx:week9
    container_name: greendevcorp-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - greendevcorp-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Persona B — backend (Node.js app)
  # ---------------------------------------------------------------------------
  backend:
    build: ./application
    image: greendevcorp/backend:week9
    container_name: greendevcorp-backend
    environment:
      - PORT=${BACKEND_PORT:-3000}
    depends_on:
      - postgres
    networks:
      - greendevcorp-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Persona B — postgres (database with persistent volume)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: greendevcorp-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - greendevcorp-net
    restart: unless-stopped

networks:
  greendevcorp-net:
    driver: bridge

volumes:
  postgres_data:
