global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Backend Node.js app — exposes /metrics via prom-client
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3000']

  # Node exporter — host/VM system metrics (CPU, memory, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
