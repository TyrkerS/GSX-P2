apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: postgres
type: Opaque
data:
  # Base64 encoded values:
  # greendevcorp -> Z3JlZW5kZXZjb3Jw
  # supersecret -> c3VwZXJzZWNyZXQ=
  POSTGRES_USER: Z3JlZW5kZXZjb3Jw
  POSTGRES_PASSWORD: c3VwZXJzZWNyZXQ=
  POSTGRES_DB: Z3JlZW5kZXZjb3Jw
