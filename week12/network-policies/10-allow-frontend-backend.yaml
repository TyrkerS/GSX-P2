# Permitir trafico Nginx (frontend) -> backend dentro del MISMO entorno.
#
# Cada flujo entre dos pods bajo default-deny necesita DOS NetworkPolicies:
#   - Ingress en el destino: backend acepta conexiones de nginx.
#   - Egress en el origen:   nginx puede iniciar la conexion al backend.
#
# Si solo abres uno de los dos lados, los paquetes salen pero no llegan
# (o llegan pero no pueden volver). Ambos tests con kubectl exec timeoutean.
#
# Solo dev esta desplegado actualmente (servicios `nginx`, `backend`,
# `postgres` en el namespace default). Las plantillas para staging y prod
# viven en `templates-staging-prod.yaml` y demuestran el patron pero no
# matchearan ningun pod hasta que existan deployments con esos labels.
#
# Verificacion (despues de aplicar `apply-week12.ps1`):
#   kubectl exec <nginx-pod>  -- wget -qO- --timeout=5 http://backend:3000/health  # 200 OK
#   kubectl exec <tester>     -- wget -qO- --timeout=5 http://backend:3000/        # debe fallar
---
# 10a - Ingress: backend-dev acepta conexiones desde nginx-dev en TCP 3000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-backend-dev-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: backend
      environment: dev
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
              environment: dev
      ports:
        - protocol: TCP
          port: 3000
---
# 10b - Egress: nginx-dev puede iniciar conexiones a backend-dev en TCP 3000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-to-backend-dev-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: nginx
      environment: dev
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend
              environment: dev
      ports:
        - protocol: TCP
          port: 3000
# Las versiones staging y prod estan en `templates-staging-prod.yaml`.
