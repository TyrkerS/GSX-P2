# Aislamiento entre entornos (dev / staging / prod).
#
# Decision tomada: SINGLE-NAMESPACE + SELECTORS POR LABEL.
#
# NetworkPolicies en Kubernetes son aditivas y NO admiten "deny" explicito:
# todo es default-deny + allowlist. Por tanto el aislamiento cross-env se
# consigue por construccion en las policies 10/11/12 (frontend->backend) y
# 20/21/22 (backend->postgres):
#
#   - Cada policy abre UN flujo concreto: nginx-X -> backend-X (mismo env).
#   - No hay ninguna policy que abra nginx-X -> backend-Y donde X != Y.
#   - Bajo default-deny, "no abierto" = bloqueado.
#
# Resultado: trafico cross-env queda bloqueado sin escribir un policy
# adicional. Esta es la barrera de aislamiento.
#
# Por que NO usamos namespaces separados (la otra opcion del enunciado):
#   - Anade complejidad operacional (RoleBindings, NetworkPolicies por NS,
#     services con FQDN cross-namespace) que no aporta nada nuevo en la
#     demo de Minikube.
#   - El selector por label `environment` es suficiente para demostrar el
#     concepto y mas facil de auditar en un cluster pequeno.
#   - En produccion real con multiples equipos sí migrariamos a un NS por
#     entorno + RBAC, pero esa decision queda fuera del alcance de la P2.
#
# Defensa en profundidad disponible si lo quisieramos endurecer:
#   - Anadir admission controller (OPA / Kyverno) que prohiba crear pods
#     sin la label `environment`.
#   - Etiquetar nodos por entorno y usar nodeAffinity + taints para que
#     los pods de un entorno no compartan nodo con otros.
#
# Conclusion: este fichero NO contiene NetworkPolicies. La regla de
# cross-env-deny vive en las policies 10-22 por construccion.
