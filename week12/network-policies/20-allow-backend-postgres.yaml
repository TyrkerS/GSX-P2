# Permitir trafico backend -> postgres dentro del MISMO entorno.
#
# Misma logica que la policy 10: dos NetworkPolicies por flujo, una de
# ingress en el destino (postgres) y otra de egress en el origen (backend).
#
# Solo dev esta desplegado actualmente. Las plantillas staging/prod estan
# en `templates-staging-prod.yaml`.
#
# Verificacion:
#   kubectl exec <backend-pod> -- nc -zv postgres 5432   # open
#   kubectl exec <nginx-pod>   -- nc -zv postgres 5432   # debe fallar
---
# 20a - Ingress: postgres-dev acepta conexiones desde backend-dev en TCP 5432
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres-dev-ingress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: postgres
      environment: dev
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend
              environment: dev
      ports:
        - protocol: TCP
          port: 5432
---
# 20b - Egress: backend-dev puede iniciar conexiones a postgres-dev en TCP 5432
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-postgres-dev-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: backend
      environment: dev
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
              environment: dev
      ports:
        - protocol: TCP
          port: 5432
# Las versiones staging y prod estan en `templates-staging-prod.yaml`.
